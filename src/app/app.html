<audio #audioPlayer class="d-none" [src]="playerState.currentSong().fileName" preload="none"
    (ended)="onAudioEnded();playerState.canPlayAudio.set(false)" (pause)="onAudioPaused()"
    (play)="onAudioPlayed()" (canplay)="playerState.canPlayAudio.set(true)">
</audio>
@if(stateService.isLargeScreen() || stateService.isMediumScreen()){
    @defer (on immediate) {
        <app-l-navbar />
        <router-outlet />
    }
}
@else {
    @defer (on immediate) {
        @if(isNavigating()){
            <div class="top-loader"></div>
        }
        <app-sidebar />
        @if(!this.router.url.includes('search')){
            <app-navbar />
        }
        <router-outlet />
    }
}
